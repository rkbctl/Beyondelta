  <title
     id="title1">Beyondelta mark — black ring with gold arc</title>
  <desc
     id="desc1">Eight nested blurred navy triangles converge toward the center, masked so no haze extends into the ring's interior, leaving it genuinely transparent. The ring's outline is mostly black with a short arc segment in Enersoul gold.</desc>
