<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="340"
   height="320"
   viewBox="0 0 340 320"
   xmlns="http://www.w3.org/2000/svg">
  <title>Beyondelta mark — single color stamp (for small sizes / favicon)</title>
  <defs>
    <filter id="st0" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="16.0"/></filter>
    <filter id="st7" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="2.0"/></filter>
    <mask id="stampRingCutout" maskUnits="userSpaceOnUse" x="0" y="0" width="340" height="320">
      <rect x="0" y="0" width="340" height="320" fill="#FFFFFF"/>
      <circle cx="170" cy="196" r="14" fill="#000000"/>
    </mask>
  </defs>
  <g mask="url(#stampRingCutout)">
    <path d="M 170.0 50.0 L 296.0 270.0 L 44.0 270.0 Z" fill="#F5F5F0" opacity="0.45" filter="url(#st0)"/>
    <path d="M 170.0 175.6 L 187.6 206.4 L 152.4 206.4 Z" fill="#F5F5F0" opacity="0.95" filter="url(#st7)"/>
  </g>
  <circle cx="170" cy="196" r="14" fill="none" stroke="#F5F5F0" stroke-width="2.2"/>
</svg>
